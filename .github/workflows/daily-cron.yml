name: Daily Morning Feed

on:
  schedule:
    - cron: "0 12 * * 1-5"
  workflow_dispatch:

jobs:
  run-daily-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t daily-feed .

      - name: Run Daily Feed
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_APP_PASSWORD: ${{ secrets.EMAIL_APP_PASSWORD }}
          DAILY_FEED_ICON_URL: ${{ secrets.DAILY_FEED_ICON_URL }}
        run: |
          docker run --rm \
            -e NEWS_API_KEY="$NEWS_API_KEY" \
            -e EMAIL_SENDER="$EMAIL_SENDER" \
            -e EMAIL_APP_PASSWORD="$EMAIL_APP_PASSWORD" \
            -e DAILY_FEED_ICON_URL="$DAILY_FEED_ICON_URL" \
            -e SEND_EMAIL=true \
            -e SHOW_GRAPHS=false \
            daily-feed
